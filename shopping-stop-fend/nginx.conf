server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Serve index.html for all non-file routes (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Optional: disable .htaccess or hidden files
    location ~ /\. {
        deny all;
    }
}